<!-- TITLE: The Divine Energy -->
<!-- SANSKRIT: daivī hy eṣā guṇamayī mama māyā duratyayā
 mām eva ye prapadyante māyām etāṁ taranti te ॥ १४ ॥ -->
<!-- TRANSLITERATION: daivī hy eṣā guṇamayī mama māyā duratyayā
 mām eva ye prapadyante māyām etāṁ taranti te -->
<!-- TRANSLATION: This divine energy of Mine, consisting of the three modes of material nature, is difficult to overcome. But those who have surrendered unto Me can easily cross over it. -->

<!-- YOGA SŪTRA CONNECTION -->
<!-- YS_LOCATION: II.45 -->
<!-- YS_SANSKRIT: समाधिसिद्धिः ईश्वरप्रणिधानात् -->
<!-- YS_TRANSLITERATION: samādhi-siddhiḥ īśvara-praṇidhānāt -->
<!-- YS_TRANSLATION: Surrender to Īśvara brings about the perfection of samādhi. -->
<!-- YS_BRIDGE: BG 7.14 and YS II.45 are two expressions of the same truth. Kṛṣṇa declares that the divine energy of the three modes (māyā) is difficult to overcome, but those who surrender unto Him (prapadyante) can easily cross it (taranti te). Patañjali declares that surrender to Īśvara (īśvara-praṇidhānāt) brings the perfection of samādhi (samādhi-siddhiḥ). The "three modes" (guṇamayī) in BG correspond to the fluctuating field of citta-vṛtti that yoga seeks to still. Just as the three modes bind the living entity to material nature, the citta-vṛtti binds the consciousness to the external world. Surrender to the Lord is the direct method to transcend both: in the Gītā, by surrendering to Kṛṣṇa one crosses māyā; in the Yoga Sūtras, by surrendering to Īśvara one attains samādhi-siddhi. Vyāsa's bhāṣya on II.45 confirms that īśvara-praṇidhāna is the most direct path because it targets the root cause (avidyā) rather than the symptoms. Kṛṣṇa’s call to surrender is not passive resignation but active alignment with the Divine Will, which dissolves the grip of the three modes and frees the consciousness to know its true nature. -->
